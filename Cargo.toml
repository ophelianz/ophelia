[package]
name = "ophelia"
version = "0.1.0"
edition = "2024"

[dependencies]
futures = "0.3.32"
gpui = { package = "gpui-ce", version = "0.3" }
reqwest = { version = "0.13.2", features = ["stream"] }
tokio = { version = "1.50.0", features = ["rt-multi-thread", "macros", "fs", "sync", "time"] }

[dev-dependencies]
proptest = "1.11.0"
sha2 = "0.11.0"
tempfile = "3.27.0"
wiremock = "0.6.5"
