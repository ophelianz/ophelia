name: CI

on:
  pull_request:
  push:

jobs:
  checks:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - ubuntu-latest
          - windows-latest

    steps:
      - uses: actions/checkout@v5

      - name: Checkout gpui-ce sibling
        shell: bash
        run: |
          rm -rf ../gpui-ce
          git clone --depth 1 https://github.com/ophelianz/gpui-ce.git ../gpui-ce

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Cargo check
        run: cargo check

      - name: Cargo test
        run: cargo test
