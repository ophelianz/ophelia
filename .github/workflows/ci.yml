name: CI

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  checks:
    name: ci / macos
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest

    steps:
      - uses: actions/checkout@v5

      - name: Checkout gpui-ce sibling
        run: scripts/checkout_gpui_ce.sh

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93
          components: rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Cargo check
        run: cargo check --locked

      - name: Cargo test
        run: cargo test --locked
