name: Nightly macOS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: nightly-macos-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      gpui_ref: ${{ steps.gpui.outputs.ref }}
      website_repo: ${{ steps.website.outputs.repo }}
      website_branch: ${{ steps.website.outputs.default_branch }}

    steps:
      - uses: actions/checkout@v5

      - name: Resolve latest gpui-oe revision
        id: gpui
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          default_branch="$(gh api "repos/ophelianz/gpui-oe" --jq .default_branch)"
          gpui_ref="$(gh api "repos/ophelianz/gpui-oe/branches/${default_branch}" --jq .commit.sha)"
          echo "branch=$default_branch" >> "$GITHUB_OUTPUT"
          echo "ref=$gpui_ref" >> "$GITHUB_OUTPUT"

      - name: Validate website manifest destination
        id: website
        env:
          GH_TOKEN: ${{ github.token }}
          WEBSITE_REPO: ${{ vars.WEBSITE_REPO }}
        shell: bash
        run: |
          set -euo pipefail
          website_repo="${WEBSITE_REPO:-ophelianz/website}"
          if [[ "$website_repo" == *"://"* || "$website_repo" == *.git ]]; then
            echo "::error::WEBSITE_REPO must be set to owner/repo, not a URL or a .git remote."
            exit 1
          fi

          default_branch="$(gh api "repos/${website_repo}" --jq .default_branch)"

          echo "repo=$website_repo" >> "$GITHUB_OUTPUT"
          echo "default_branch=$default_branch" >> "$GITHUB_OUTPUT"
          {
            echo "### Nightly preflight"
            echo "- Latest \`gpui-oe\` commit: \`${{ steps.gpui.outputs.ref }}\`"
            echo "- GUI package: \`ophelia-gui\`"
            echo "- Backend package: \`ophelia\`"
            echo "- Website repo: \`${website_repo}\`"
            echo "- Website branch: \`${default_branch}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  build:
    name: Build ${{ matrix.arch_slug }}
    needs: preflight
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-26
            arch_slug: arm64
          - runner: macos-26-intel
            arch_slug: x86_64
    env:
      OPHELIA_RELEASE_CHANNEL: nightly
      OPHELIA_UPDATE_MANIFEST_BASE_URL: https://ophelia.nz/updates
      OPHELIA_MINISIGN_PUBKEY: ${{ secrets.OPHELIA_MINISIGN_PUBKEY }}

    steps:
      - uses: actions/checkout@v5

      - name: Checkout gpui-oe sibling
        env:
          GPUI_REF: ${{ needs.preflight.outputs.gpui_ref }}
        run: scripts/checkout_gpui_oe.sh

      - name: Compute build metadata
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ github.event.head_commit.timestamp }}" ]; then
            timestamp='${{ github.event.head_commit.timestamp }}'
          else
            timestamp="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          fi
          echo "OPHELIA_BUILD_COMMIT=$(git rev-parse HEAD)" >> "$GITHUB_ENV"
          echo "OPHELIA_BUILD_TIMESTAMP=$timestamp" >> "$GITHUB_ENV"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install release tooling
        shell: bash
        run: |
          set -euo pipefail
          brew install minisign

      - name: Bundle, sign, and notarize app
        id: bundle
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_NOTARY_API_KEY_P8_B64: ${{ secrets.APPLE_NOTARY_API_KEY_P8_B64 }}
          APPLE_NOTARY_API_KEY_ID: ${{ secrets.APPLE_NOTARY_API_KEY_ID }}
          APPLE_NOTARY_API_ISSUER_ID: ${{ secrets.APPLE_NOTARY_API_ISSUER_ID }}
          MINISIGN_PRIVATE_KEY: ${{ secrets.MINISIGN_PRIVATE_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          scripts/bundle_macos.sh \
            --channel nightly \
            --arch "${{ matrix.arch_slug }}" \
            --output-dir "dist/macos/${{ matrix.arch_slug }}" \
            --sign \
            --notarize \
            --minisign

      - name: Upload release assets
        uses: actions/upload-artifact@v7
        with:
          name: macos-release-${{ matrix.arch_slug }}
          if-no-files-found: error
          retention-days: 7
          path: |
            dist/macos/${{ matrix.arch_slug }}/Ophelia-macos-${{ matrix.arch_slug }}.zip
            dist/macos/${{ matrix.arch_slug }}/Ophelia-macos-${{ matrix.arch_slug }}.zip.minisig
            dist/macos/${{ matrix.arch_slug }}/Ophelia-macos-${{ matrix.arch_slug }}.dmg
            dist/macos/${{ matrix.arch_slug }}/Ophelia-macos-${{ matrix.arch_slug }}.dmg.minisig

  publish:
    name: Publish nightly
    needs:
      - preflight
      - build
    runs-on: ubuntu-latest
    environment: nightly-release
    permissions:
      contents: write
    env:
      OPHELIA_UPDATE_MANIFEST_BASE_URL: https://ophelia.nz/updates
      WEBSITE_DEPLOY_TOKEN: ${{ secrets.WEBSITE_DEPLOY_TOKEN }}
      WEBSITE_REPO: ${{ needs.preflight.outputs.website_repo }}
      WEBSITE_BRANCH: ${{ needs.preflight.outputs.website_branch }}

    steps:
      - uses: actions/checkout@v5

      - name: Download release assets
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          pattern: macos-release-*

      - name: Validate website repo token access
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${WEBSITE_DEPLOY_TOKEN:-}" ]]; then
            echo "::error::WEBSITE_DEPLOY_TOKEN is not configured for the nightly-release environment."
            exit 1
          fi
          git ls-remote "https://x-access-token:${WEBSITE_DEPLOY_TOKEN}@github.com/${WEBSITE_REPO}.git" "refs/heads/${WEBSITE_BRANCH}" >/dev/null

      - name: Publish rolling nightly release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          mapfile -d '' files < <(find release-assets -type f -print0)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "::error::No release assets were downloaded."
            exit 1
          fi

          notes="Rolling nightly build for ${GITHUB_SHA::7}"
          if gh release view nightly >/dev/null 2>&1; then
            gh release upload nightly "${files[@]}" --clobber
            gh release edit nightly --title "Ophelia Nightly" --notes "$notes" --prerelease --target "$GITHUB_SHA"
          else
            gh release create nightly "${files[@]}" --title "Ophelia Nightly" --notes "$notes" --prerelease --latest=false --target "$GITHUB_SHA"
          fi

      - name: Generate nightly manifests
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ github.event.head_commit.timestamp }}" ]; then
            timestamp='${{ github.event.head_commit.timestamp }}'
          else
            timestamp="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          fi
          version="nightly-${GITHUB_SHA::7}"

          for arch in arm64 x86_64; do
            zip_path="$(find release-assets -name "Ophelia-macos-${arch}.zip" -print -quit)"
            test -n "$zip_path"
            sha256="$(shasum -a 256 "$zip_path" | awk '{print $1}')"
            size="$(stat -c%s "$zip_path")"
            python3 scripts/update_manifest.py \
              --channel nightly \
              --version "$version" \
              --pub-date "$timestamp" \
              --commit "$GITHUB_SHA" \
              --notes-url "https://github.com/${{ github.repository }}/releases/tag/nightly" \
              --asset-url "https://github.com/${{ github.repository }}/releases/download/nightly/Ophelia-macos-${arch}.zip" \
              --asset-size "$size" \
              --sha256 "$sha256" \
              --minisign-url "https://github.com/${{ github.repository }}/releases/download/nightly/Ophelia-macos-${arch}.zip.minisig" \
              --output "dist/updates/macos/${arch}/nightly.json"
          done

      - name: Checkout website repo
        uses: actions/checkout@v5
        with:
          repository: ${{ needs.preflight.outputs.website_repo }}
          ref: ${{ needs.preflight.outputs.website_branch }}
          token: ${{ secrets.WEBSITE_DEPLOY_TOKEN }}
          path: website
          persist-credentials: false

      - name: Validate website repo push access
        shell: bash
        run: |
          set -euo pipefail
          cd website
          git remote set-url origin "https://x-access-token:${WEBSITE_DEPLOY_TOKEN}@github.com/${WEBSITE_REPO}.git"
          if ! git push --dry-run origin HEAD:"${WEBSITE_BRANCH}" >/tmp/ophelia-website-push-check.log 2>&1; then
            echo "::error::WEBSITE_DEPLOY_TOKEN can read ${WEBSITE_REPO} but cannot push to ${WEBSITE_BRANCH}."
            echo "::error::Confirm the token has Contents: Read and write for ${WEBSITE_REPO}, is authorized for the ophelianz org if SSO applies, and that ${WEBSITE_BRANCH} is not blocked for this token."
            cat /tmp/ophelia-website-push-check.log
            exit 1
          fi

      - name: Publish nightly manifests to website repo
        shell: bash
        run: |
          set -euo pipefail
          for arch in arm64 x86_64; do
            mkdir -p "website/public/updates/macos/${arch}"
            cp "dist/updates/macos/${arch}/nightly.json" "website/public/updates/macos/${arch}/nightly.json"
          done

          cd website
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/updates/macos/arm64/nightly.json public/updates/macos/x86_64/nightly.json
          git diff --cached --quiet && exit 0
          git commit -m "Update Ophelia nightly manifests (${GITHUB_SHA::7})"
          git remote set-url origin "https://x-access-token:${WEBSITE_DEPLOY_TOKEN}@github.com/${WEBSITE_REPO}.git"
          for attempt in 1 2 3; do
            if git push origin HEAD:"${WEBSITE_BRANCH}"; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            git fetch origin "${WEBSITE_BRANCH}"
            git rebase "origin/${WEBSITE_BRANCH}"
            sleep 5
          done

      - name: Summarize published nightly
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "### Nightly publish"
            echo "- Release: [nightly](https://github.com/${{ github.repository }}/releases/tag/nightly)"
            echo "- Manifests:"
            echo "  - https://ophelia.nz/updates/macos/arm64/nightly.json"
            echo "  - https://ophelia.nz/updates/macos/x86_64/nightly.json"
          } >> "$GITHUB_STEP_SUMMARY"
