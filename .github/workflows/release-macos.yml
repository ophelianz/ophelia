name: Stable macOS Release

on:
  release:
    types:
      - published

concurrency:
  group: stable-macos-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      website_repo: ${{ steps.website.outputs.repo }}
      website_branch: ${{ steps.website.outputs.default_branch }}
      stable_version: ${{ steps.version.outputs.stable_version }}

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Validate stable release tag
        id: version
        shell: bash
        run: |
          set -euo pipefail
          tag_name='${{ github.event.release.tag_name }}'
          if [[ ! "$tag_name" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Stable release tags must look like vX.Y.Z."
            exit 1
          fi

          cargo_version="$(python3 -c 'import tomllib; print(tomllib.load(open("Cargo.toml", "rb"))["package"]["version"])')"
          stable_version="${tag_name#v}"
          if [[ "$cargo_version" != "$stable_version" ]]; then
            echo "::error::Cargo.toml version ($cargo_version) did not match release tag ($stable_version)."
            exit 1
          fi
          echo "stable_version=$stable_version" >> "$GITHUB_OUTPUT"

      - name: Validate pinned gpui-oe revision
        id: gpui
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gpui_ref="$(tr -d '[:space:]' < .github/gpui-oe-ref)"
          if [[ ! "$gpui_ref" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::Expected .github/gpui-oe-ref to contain a full 40-character commit SHA."
            exit 1
          fi
          gh api "repos/ophelianz/gpui-oe/commits/${gpui_ref}" --jq .sha >/dev/null
          echo "ref=$gpui_ref" >> "$GITHUB_OUTPUT"

      - name: Validate website manifest destination
        id: website
        env:
          GH_TOKEN: ${{ github.token }}
          WEBSITE_REPO: ${{ vars.WEBSITE_REPO }}
        shell: bash
        run: |
          set -euo pipefail
          website_repo="${WEBSITE_REPO:-ophelianz/website}"
          if [[ "$website_repo" == *"://"* || "$website_repo" == *.git ]]; then
            echo "::error::WEBSITE_REPO must be set to owner/repo, not a URL or a .git remote."
            exit 1
          fi

          default_branch="$(gh api "repos/${website_repo}" --jq .default_branch)"

          echo "repo=$website_repo" >> "$GITHUB_OUTPUT"
          echo "default_branch=$default_branch" >> "$GITHUB_OUTPUT"
          {
            echo "### Stable preflight"
            echo "- Release tag: \`${{ github.event.release.tag_name }}\`"
            echo "- Cargo version: \`${{ steps.version.outputs.stable_version }}\`"
            echo "- Pinned \`gpui-oe\` repo commit: \`${{ steps.gpui.outputs.ref }}\`"
            echo "- Cargo package compatibility: \`gpui-ce\`"
            echo "- Website repo: \`${website_repo}\`"
            echo "- Website branch: \`${default_branch}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  build:
    name: Build ${{ matrix.arch_slug }}
    needs: preflight
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-26
            arch_slug: arm64
          - runner: macos-26-intel
            arch_slug: x86_64
    env:
      OPHELIA_RELEASE_CHANNEL: stable
      OPHELIA_UPDATE_MANIFEST_BASE_URL: https://ophelia.nz/updates
      OPHELIA_MINISIGN_PUBKEY: ${{ secrets.OPHELIA_MINISIGN_PUBKEY }}

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Checkout gpui-oe sibling
        run: scripts/checkout_gpui_oe.sh

      - name: Compute build metadata
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ github.event.release.published_at }}" ]; then
            timestamp='${{ github.event.release.published_at }}'
          else
            timestamp="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          fi
          echo "OPHELIA_BUILD_COMMIT=$(git rev-parse HEAD)" >> "$GITHUB_ENV"
          echo "OPHELIA_BUILD_TIMESTAMP=$timestamp" >> "$GITHUB_ENV"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.1

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install release tooling
        shell: bash
        run: |
          set -euo pipefail
          brew install minisign
          cargo install cargo-bundle --locked

      - name: Import Apple signing certificate
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_NOTARY_API_KEY_P8_B64: ${{ secrets.APPLE_NOTARY_API_KEY_P8_B64 }}
          APPLE_NOTARY_API_KEY_ID: ${{ secrets.APPLE_NOTARY_API_KEY_ID }}
          APPLE_NOTARY_API_ISSUER_ID: ${{ secrets.APPLE_NOTARY_API_ISSUER_ID }}
        shell: bash
        run: |
          set -euo pipefail
          certificate_path="${RUNNER_TEMP}/ophelia-certificate.p12"
          keychain_path="${RUNNER_TEMP}/ophelia-build.keychain-db"
          notary_key_path="${RUNNER_TEMP}/ophelia-notary-authkey.p8"
          notary_profile="ophelia-notary"
          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > "$certificate_path"
          echo "$APPLE_NOTARY_API_KEY_P8_B64" | base64 --decode > "$notary_key_path"
          keychain_password="$(uuidgen)"
          {
            echo "APPLE_BUILD_KEYCHAIN=$keychain_path"
            echo "APPLE_BUILD_KEYCHAIN_PASSWORD=$keychain_password"
            echo "APPLE_CERTIFICATE_PATH=$certificate_path"
            echo "APPLE_NOTARY_API_KEY_PATH=$notary_key_path"
            echo "APPLE_NOTARY_PROFILE=$notary_profile"
            echo "MINISIGN_KEY_PATH=${RUNNER_TEMP}/ophelia-minisign.key"
          } >> "$GITHUB_ENV"
          security create-keychain -p "$keychain_password" "$keychain_path"
          security default-keychain -s "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings "$keychain_path"
          security import "$certificate_path" -k "$keychain_path" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$keychain_password" "$keychain_path"
          xcrun notarytool store-credentials "$notary_profile" \
            --key "$notary_key_path" \
            --key-id "$APPLE_NOTARY_API_KEY_ID" \
            --issuer "$APPLE_NOTARY_API_ISSUER_ID" \
            --validate \
            --keychain "$keychain_path"

      - name: Build app bundle
        run: cargo bundle --release

      - name: Package signed app for notarization
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        shell: bash
        run: |
          set -euo pipefail
          matching_identities="$(security find-identity -v -p codesigning | grep -F "$APPLE_SIGNING_IDENTITY" || true)"
          if [[ -z "$matching_identities" ]]; then
            echo "::error::Expected signing identity '$APPLE_SIGNING_IDENTITY' was not imported."
            security find-identity -v -p codesigning
            exit 1
          fi
          match_count="$(printf '%s\n' "$matching_identities" | sed '/^$/d' | wc -l | tr -d ' ')"
          if [[ "$match_count" != "1" ]]; then
            echo "::error::Expected exactly one matching signing identity, found $match_count."
            printf '%s\n' "$matching_identities"
            exit 1
          fi

          APP_BUNDLE="$(find target/release/bundle -name 'Ophelia.app' | head -n 1)"
          test -n "$APP_BUNDLE"
          echo "Signing app bundle: $APP_BUNDLE"
          echo "Bundle file count: $(find "$APP_BUNDLE" | wc -l | tr -d ' ')"
          for attempt in 1 2 3; do
            if time codesign --force --options runtime --timestamp --verbose=4 --sign "$APPLE_SIGNING_IDENTITY" "$APP_BUNDLE"; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            echo "codesign failed; retrying in 20s (attempt $attempt/3)"
            sleep 20
          done
          time codesign --verify --strict "$APP_BUNDLE"
          time ditto -c -k --keepParent --rsrc --sequesterRsrc "$APP_BUNDLE" "Ophelia-macos-${{ matrix.arch_slug }}-notary.zip"
          ls -lh "Ophelia-macos-${{ matrix.arch_slug }}-notary.zip"

      - name: Notarize app bundle
        shell: bash
        run: |
          set -euo pipefail
          result="$(xcrun notarytool submit "Ophelia-macos-${{ matrix.arch_slug }}-notary.zip" \
            -p "$APPLE_NOTARY_PROFILE" \
            --keychain "$APPLE_BUILD_KEYCHAIN" \
            --wait \
            --output-format json)"
          echo "$result"
          status="$(python3 -c 'import json,sys; print(json.load(sys.stdin)["status"])' <<<"$result")"
          if [ "$status" != "Accepted" ]; then
            submission_id="$(python3 -c 'import json,sys; print(json.load(sys.stdin)["id"])' <<<"$result")"
            echo "Notarization failed with status: $status"
            xcrun notarytool log "$submission_id" \
              -p "$APPLE_NOTARY_PROFILE" \
              --keychain "$APPLE_BUILD_KEYCHAIN" || true
            exit 1
          fi

      - name: Staple and validate app bundle
        shell: bash
        run: |
          set -euo pipefail
          APP_BUNDLE="$(find target/release/bundle -name 'Ophelia.app' | head -n 1)"
          test -n "$APP_BUNDLE"
          for attempt in 1 2 3 4 5; do
            if xcrun stapler staple "$APP_BUNDLE"; then
              break
            fi
            if [ "$attempt" -eq 5 ]; then
              exit 1
            fi
            echo "Stapler ticket not ready yet for app bundle; retrying in 30s (attempt $attempt/5)"
            sleep 30
          done
          xcrun stapler validate "$APP_BUNDLE"
          spctl --assess --type execute -vv "$APP_BUNDLE"

      - name: Build final distributables
        shell: bash
        run: |
          set -euo pipefail
          APP_BUNDLE="$(find target/release/bundle -name 'Ophelia.app' | head -n 1)"
          test -n "$APP_BUNDLE"
          ditto -c -k --keepParent --rsrc --sequesterRsrc "$APP_BUNDLE" "Ophelia-macos-${{ matrix.arch_slug }}.zip"
          hdiutil create -volname "Ophelia" -srcfolder "$APP_BUNDLE" -ov -format UDZO "Ophelia-macos-${{ matrix.arch_slug }}.dmg"

      - name: Notarize and staple DMG
        shell: bash
        run: |
          set -euo pipefail
          result="$(xcrun notarytool submit "Ophelia-macos-${{ matrix.arch_slug }}.dmg" \
            -p "$APPLE_NOTARY_PROFILE" \
            --keychain "$APPLE_BUILD_KEYCHAIN" \
            --wait \
            --output-format json)"
          echo "$result"
          status="$(python3 -c 'import json,sys; print(json.load(sys.stdin)["status"])' <<<"$result")"
          if [ "$status" != "Accepted" ]; then
            submission_id="$(python3 -c 'import json,sys; print(json.load(sys.stdin)["id"])' <<<"$result")"
            echo "DMG notarization failed with status: $status"
            xcrun notarytool log "$submission_id" \
              -p "$APPLE_NOTARY_PROFILE" \
              --keychain "$APPLE_BUILD_KEYCHAIN" || true
            exit 1
          fi
          for attempt in 1 2 3 4 5; do
            if xcrun stapler staple "Ophelia-macos-${{ matrix.arch_slug }}.dmg"; then
              break
            fi
            if [ "$attempt" -eq 5 ]; then
              exit 1
            fi
            echo "Stapler ticket not ready yet for DMG; retrying in 30s (attempt $attempt/5)"
            sleep 30
          done
          xcrun stapler validate "Ophelia-macos-${{ matrix.arch_slug }}.dmg"

      - name: Sign distributables with minisign
        env:
          MINISIGN_PRIVATE_KEY: ${{ secrets.MINISIGN_PRIVATE_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          printf '%s' "$MINISIGN_PRIVATE_KEY" > "$MINISIGN_KEY_PATH"
          minisign -S -s "$MINISIGN_KEY_PATH" -m "Ophelia-macos-${{ matrix.arch_slug }}.zip"
          minisign -S -s "$MINISIGN_KEY_PATH" -m "Ophelia-macos-${{ matrix.arch_slug }}.dmg"

      - name: Upload release assets
        uses: actions/upload-artifact@v7
        with:
          name: macos-release-${{ matrix.arch_slug }}
          if-no-files-found: error
          retention-days: 30
          path: |
            Ophelia-macos-${{ matrix.arch_slug }}.zip
            Ophelia-macos-${{ matrix.arch_slug }}.zip.minisig
            Ophelia-macos-${{ matrix.arch_slug }}.dmg
            Ophelia-macos-${{ matrix.arch_slug }}.dmg.minisig

      - name: Cleanup signing material
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${APPLE_BUILD_KEYCHAIN:-}" ]; then
            security delete-keychain "$APPLE_BUILD_KEYCHAIN" || true
          fi
          rm -f "${APPLE_CERTIFICATE_PATH:-}" "${APPLE_NOTARY_API_KEY_PATH:-}" "${MINISIGN_KEY_PATH:-}"

  publish:
    name: Publish stable
    needs:
      - preflight
      - build
    runs-on: ubuntu-latest
    environment: stable-release
    permissions:
      contents: write
    env:
      OPHELIA_UPDATE_MANIFEST_BASE_URL: https://ophelia.nz/updates
      WEBSITE_DEPLOY_TOKEN: ${{ secrets.WEBSITE_DEPLOY_TOKEN }}
      WEBSITE_REPO: ${{ needs.preflight.outputs.website_repo }}
      WEBSITE_BRANCH: ${{ needs.preflight.outputs.website_branch }}

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Download release assets
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          pattern: macos-release-*

      - name: Validate website repo token access
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${WEBSITE_DEPLOY_TOKEN:-}" ]]; then
            echo "::error::WEBSITE_DEPLOY_TOKEN is not configured for the stable-release environment."
            exit 1
          fi
          git ls-remote "https://x-access-token:${WEBSITE_DEPLOY_TOKEN}@github.com/${WEBSITE_REPO}.git" "refs/heads/${WEBSITE_BRANCH}" >/dev/null

      - name: Upload stable release assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          mapfile -d '' files < <(find release-assets -type f -print0)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "::error::No release assets were downloaded."
            exit 1
          fi

          gh release view "${{ github.event.release.tag_name }}" >/dev/null
          gh release upload "${{ github.event.release.tag_name }}" "${files[@]}" --clobber

      - name: Generate stable manifests
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ github.event.release.published_at }}" ]; then
            timestamp='${{ github.event.release.published_at }}'
          else
            timestamp="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          fi
          stable_version='${{ needs.preflight.outputs.stable_version }}'

          for arch in arm64 x86_64; do
            zip_path="$(find release-assets -name "Ophelia-macos-${arch}.zip" -print -quit)"
            test -n "$zip_path"
            sha256="$(shasum -a 256 "$zip_path" | awk '{print $1}')"
            size="$(stat -c%s "$zip_path")"
            python3 scripts/update_manifest.py \
              --channel stable \
              --version "$stable_version" \
              --pub-date "$timestamp" \
              --commit "$(git rev-parse HEAD)" \
              --notes-url "${{ github.event.release.html_url }}" \
              --asset-url "https://github.com/${{ github.repository }}/releases/download/${{ github.event.release.tag_name }}/Ophelia-macos-${arch}.zip" \
              --asset-size "$size" \
              --sha256 "$sha256" \
              --minisign-url "https://github.com/${{ github.repository }}/releases/download/${{ github.event.release.tag_name }}/Ophelia-macos-${arch}.zip.minisig" \
              --output "dist/updates/macos/${arch}/stable.json"
          done

      - name: Checkout website repo
        uses: actions/checkout@v5
        with:
          repository: ${{ needs.preflight.outputs.website_repo }}
          ref: ${{ needs.preflight.outputs.website_branch }}
          token: ${{ secrets.WEBSITE_DEPLOY_TOKEN }}
          path: website
          persist-credentials: false

      - name: Publish stable manifests to website repo
        shell: bash
        run: |
          set -euo pipefail
          for arch in arm64 x86_64; do
            mkdir -p "website/public/updates/macos/${arch}"
            cp "dist/updates/macos/${arch}/stable.json" "website/public/updates/macos/${arch}/stable.json"
          done

          cd website
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/updates/macos/arm64/stable.json public/updates/macos/x86_64/stable.json
          git diff --cached --quiet && exit 0
          git commit -m "Update Ophelia stable manifests (${{ github.event.release.tag_name }})"
          git remote set-url origin "https://x-access-token:${WEBSITE_DEPLOY_TOKEN}@github.com/${WEBSITE_REPO}.git"
          for attempt in 1 2 3; do
            if git push origin HEAD:"${WEBSITE_BRANCH}"; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            git fetch origin "${WEBSITE_BRANCH}"
            git rebase "origin/${WEBSITE_BRANCH}"
            sleep 5
          done

      - name: Summarize published stable release
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "### Stable publish"
            echo "- Release: ${{ github.event.release.html_url }}"
            echo "- Manifests:"
            echo "  - https://ophelia.nz/updates/macos/arm64/stable.json"
            echo "  - https://ophelia.nz/updates/macos/x86_64/stable.json"
          } >> "$GITHUB_STEP_SUMMARY"
