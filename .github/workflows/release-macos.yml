name: Stable macOS Release

on:
  release:
    types:
      - published

concurrency:
  group: stable-macos-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      gpui_ref: ${{ steps.gpui.outputs.ref }}
      website_repo: ${{ steps.website.outputs.repo }}
      website_branch: ${{ steps.website.outputs.default_branch }}
      stable_version: ${{ steps.version.outputs.stable_version }}

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Validate stable release tag
        id: version
        shell: bash
        run: |
          set -euo pipefail
          tag_name='${{ github.event.release.tag_name }}'
          if [[ ! "$tag_name" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Stable release tags must look like vX.Y.Z."
            exit 1
          fi

          cargo_version="$(python3 -c 'import tomllib; print(tomllib.load(open("crates/ophelia-gui/Cargo.toml", "rb"))["package"]["version"])')"
          stable_version="${tag_name#v}"
          if [[ "$cargo_version" != "$stable_version" ]]; then
            echo "::error::crates/ophelia-gui/Cargo.toml version ($cargo_version) did not match release tag ($stable_version)."
            exit 1
          fi
          echo "stable_version=$stable_version" >> "$GITHUB_OUTPUT"

      - name: Resolve latest gpui-oe revision
        id: gpui
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          default_branch="$(gh api "repos/ophelianz/gpui-oe" --jq .default_branch)"
          gpui_ref="$(gh api "repos/ophelianz/gpui-oe/branches/${default_branch}" --jq .commit.sha)"
          echo "branch=$default_branch" >> "$GITHUB_OUTPUT"
          echo "ref=$gpui_ref" >> "$GITHUB_OUTPUT"

      - name: Validate website manifest destination
        id: website
        env:
          GH_TOKEN: ${{ github.token }}
          WEBSITE_REPO: ${{ vars.WEBSITE_REPO }}
        shell: bash
        run: |
          set -euo pipefail
          website_repo="${WEBSITE_REPO:-ophelianz/website}"
          if [[ "$website_repo" == *"://"* || "$website_repo" == *.git ]]; then
            echo "::error::WEBSITE_REPO must be set to owner/repo, not a URL or a .git remote."
            exit 1
          fi

          default_branch="$(gh api "repos/${website_repo}" --jq .default_branch)"

          echo "repo=$website_repo" >> "$GITHUB_OUTPUT"
          echo "default_branch=$default_branch" >> "$GITHUB_OUTPUT"
          {
            echo "### Stable preflight"
            echo "- Release tag: \`${{ github.event.release.tag_name }}\`"
            echo "- Cargo version: \`${{ steps.version.outputs.stable_version }}\`"
            echo "- Latest \`gpui-oe\` commit: \`${{ steps.gpui.outputs.ref }}\`"
            echo "- GUI package: \`ophelia-gui\`"
            echo "- Backend package: \`ophelia\`"
            echo "- Website repo: \`${website_repo}\`"
            echo "- Website branch: \`${default_branch}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  build:
    name: Build ${{ matrix.arch_slug }}
    needs: preflight
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-26
            arch_slug: arm64
          - runner: macos-26-intel
            arch_slug: x86_64
    env:
      OPHELIA_RELEASE_CHANNEL: stable
      OPHELIA_UPDATE_MANIFEST_BASE_URL: https://ophelia.nz/updates
      OPHELIA_MINISIGN_PUBKEY: ${{ secrets.OPHELIA_MINISIGN_PUBKEY }}

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Checkout gpui-oe sibling
        env:
          GPUI_REF: ${{ needs.preflight.outputs.gpui_ref }}
        run: scripts/checkout_gpui_oe.sh

      - name: Compute build metadata
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ github.event.release.published_at }}" ]; then
            timestamp='${{ github.event.release.published_at }}'
          else
            timestamp="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          fi
          echo "OPHELIA_BUILD_COMMIT=$(git rev-parse HEAD)" >> "$GITHUB_ENV"
          echo "OPHELIA_BUILD_TIMESTAMP=$timestamp" >> "$GITHUB_ENV"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install release tooling
        shell: bash
        run: |
          set -euo pipefail
          brew install minisign

      - name: Bundle, sign, and notarize app
        id: bundle
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_NOTARY_API_KEY_P8_B64: ${{ secrets.APPLE_NOTARY_API_KEY_P8_B64 }}
          APPLE_NOTARY_API_KEY_ID: ${{ secrets.APPLE_NOTARY_API_KEY_ID }}
          APPLE_NOTARY_API_ISSUER_ID: ${{ secrets.APPLE_NOTARY_API_ISSUER_ID }}
          MINISIGN_PRIVATE_KEY: ${{ secrets.MINISIGN_PRIVATE_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          scripts/bundle_macos.sh \
            --channel stable \
            --arch "${{ matrix.arch_slug }}" \
            --output-dir "dist/macos/${{ matrix.arch_slug }}" \
            --sign \
            --notarize \
            --minisign

      - name: Upload release assets
        uses: actions/upload-artifact@v7
        with:
          name: macos-release-${{ matrix.arch_slug }}
          if-no-files-found: error
          retention-days: 30
          path: |
            dist/macos/${{ matrix.arch_slug }}/Ophelia-macos-${{ matrix.arch_slug }}.zip
            dist/macos/${{ matrix.arch_slug }}/Ophelia-macos-${{ matrix.arch_slug }}.zip.minisig
            dist/macos/${{ matrix.arch_slug }}/Ophelia-macos-${{ matrix.arch_slug }}.dmg
            dist/macos/${{ matrix.arch_slug }}/Ophelia-macos-${{ matrix.arch_slug }}.dmg.minisig

  publish:
    name: Publish stable
    needs:
      - preflight
      - build
    runs-on: ubuntu-latest
    environment: stable-release
    permissions:
      contents: write
    env:
      OPHELIA_UPDATE_MANIFEST_BASE_URL: https://ophelia.nz/updates
      WEBSITE_DEPLOY_TOKEN: ${{ secrets.WEBSITE_DEPLOY_TOKEN }}
      WEBSITE_REPO: ${{ needs.preflight.outputs.website_repo }}
      WEBSITE_BRANCH: ${{ needs.preflight.outputs.website_branch }}

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Download release assets
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          pattern: macos-release-*

      - name: Validate website repo token access
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${WEBSITE_DEPLOY_TOKEN:-}" ]]; then
            echo "::error::WEBSITE_DEPLOY_TOKEN is not configured for the stable-release environment."
            exit 1
          fi
          git ls-remote "https://x-access-token:${WEBSITE_DEPLOY_TOKEN}@github.com/${WEBSITE_REPO}.git" "refs/heads/${WEBSITE_BRANCH}" >/dev/null

      - name: Upload stable release assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          mapfile -d '' files < <(find release-assets -type f -print0)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "::error::No release assets were downloaded."
            exit 1
          fi

          gh release view "${{ github.event.release.tag_name }}" >/dev/null
          gh release upload "${{ github.event.release.tag_name }}" "${files[@]}" --clobber

      - name: Generate stable manifests
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ github.event.release.published_at }}" ]; then
            timestamp='${{ github.event.release.published_at }}'
          else
            timestamp="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          fi
          stable_version='${{ needs.preflight.outputs.stable_version }}'

          for arch in arm64 x86_64; do
            zip_path="$(find release-assets -name "Ophelia-macos-${arch}.zip" -print -quit)"
            test -n "$zip_path"
            sha256="$(shasum -a 256 "$zip_path" | awk '{print $1}')"
            size="$(stat -c%s "$zip_path")"
            python3 scripts/update_manifest.py \
              --channel stable \
              --version "$stable_version" \
              --pub-date "$timestamp" \
              --commit "$(git rev-parse HEAD)" \
              --notes-url "${{ github.event.release.html_url }}" \
              --asset-url "https://github.com/${{ github.repository }}/releases/download/${{ github.event.release.tag_name }}/Ophelia-macos-${arch}.zip" \
              --asset-size "$size" \
              --sha256 "$sha256" \
              --minisign-url "https://github.com/${{ github.repository }}/releases/download/${{ github.event.release.tag_name }}/Ophelia-macos-${arch}.zip.minisig" \
              --output "dist/updates/macos/${arch}/stable.json"
          done

      - name: Checkout website repo
        uses: actions/checkout@v5
        with:
          repository: ${{ needs.preflight.outputs.website_repo }}
          ref: ${{ needs.preflight.outputs.website_branch }}
          token: ${{ secrets.WEBSITE_DEPLOY_TOKEN }}
          path: website
          persist-credentials: false

      - name: Validate website repo push access
        shell: bash
        run: |
          set -euo pipefail
          cd website
          git remote set-url origin "https://x-access-token:${WEBSITE_DEPLOY_TOKEN}@github.com/${WEBSITE_REPO}.git"
          if ! git push --dry-run origin HEAD:"${WEBSITE_BRANCH}" >/tmp/ophelia-website-push-check.log 2>&1; then
            echo "::error::WEBSITE_DEPLOY_TOKEN can read ${WEBSITE_REPO} but cannot push to ${WEBSITE_BRANCH}."
            echo "::error::Confirm the token has Contents: Read and write for ${WEBSITE_REPO}, is authorized for the ophelianz org if SSO applies, and that ${WEBSITE_BRANCH} is not blocked for this token."
            cat /tmp/ophelia-website-push-check.log
            exit 1
          fi

      - name: Publish stable manifests to website repo
        shell: bash
        run: |
          set -euo pipefail
          for arch in arm64 x86_64; do
            mkdir -p "website/public/updates/macos/${arch}"
            cp "dist/updates/macos/${arch}/stable.json" "website/public/updates/macos/${arch}/stable.json"
          done

          cd website
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/updates/macos/arm64/stable.json public/updates/macos/x86_64/stable.json
          git diff --cached --quiet && exit 0
          git commit -m "Update Ophelia stable manifests (${{ github.event.release.tag_name }})"
          git remote set-url origin "https://x-access-token:${WEBSITE_DEPLOY_TOKEN}@github.com/${WEBSITE_REPO}.git"
          for attempt in 1 2 3; do
            if git push origin HEAD:"${WEBSITE_BRANCH}"; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            git fetch origin "${WEBSITE_BRANCH}"
            git rebase "origin/${WEBSITE_BRANCH}"
            sleep 5
          done

      - name: Summarize published stable release
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "### Stable publish"
            echo "- Release: ${{ github.event.release.html_url }}"
            echo "- Manifests:"
            echo "  - https://ophelia.nz/updates/macos/arm64/stable.json"
            echo "  - https://ophelia.nz/updates/macos/x86_64/stable.json"
          } >> "$GITHUB_STEP_SUMMARY"
